# RADIO.CFG - WIO-E5 configuration reference.
#
# Copy this file to the SD card root as RADIO.CFG (uppercase). The WIO
# loads it at boot; the same file can be pushed over BLE at runtime, which
# also rewrites the SD copy.
#
# Every key is optional - an absent key keeps its default, and an empty
# file is valid. Section headers are cosmetic: keys are unique across
# sections, so a key works regardless of which [section] it sits under.
#
# Each setting is paired with a "<key>_description" string. The firmware
# ignores unknown keys, so these descriptions are inert to the WIO - they
# exist so an editor or UI that changes these values can show help text.
# The values below are the firmware defaults.
#
# A setting may also carry a "<key>_type" string to tell such an editor which
# input to show. It is optional: int/float/bool/string are inferred from the
# value, so a type is only worth setting to constrain a string to a fixed set
# of choices, written "enum:a,b,c" (rendered as a dropdown). Also inert to the
# WIO.

# -- Radio --------------------------------------------------------------
# frequency, spreading factor, bandwidth, coding rate and power are the
# LoRa link-budget knobs: together they set sensitivity, on-air time and
# radiated power - i.e. range.
[radio]
frequency_hz = 915000000
frequency_hz_description = "RF center frequency in Hz. Valid 150000000-960000000."

spreading_factor = 7
spreading_factor_description = "LoRa spreading factor, 5-12. Higher gives longer range at a lower data rate."

bandwidth_khz = 125
bandwidth_khz_description = "LoRa bandwidth in kHz: 62, 125, 250 or 500 (62 means 62.5). Narrower gives longer range at a lower data rate."

coding_rate = 5
coding_rate_description = "Coding rate denominator 5-8 for 4/5..4/8. Higher adds forward error correction at a lower data rate."

power_dbm = 22
power_dbm_description = "Transmit power in dBm, -9 to 22 on the high-power PA."

rx_boost = false
rx_boost_description = "Boosted receiver gain: roughly +2 dB of sensitivity for a few mA more current whenever the node is listening."

# The three keys below describe the board the firmware is running on, not a
# preference. The defaults are the Wio-E5's own hardware; change them only
# for a different module, where a wrong value means a radio that does not
# start rather than one that performs badly.
dcdc_enabled = true
dcdc_enabled_description = "Use the internal DC-DC (SMPS) WIO-E5 supports this."

tcxo_volts = "1.8"
tcxo_volts_description = "Supply the radio drives the TCXO at. Wio-E5 uses a 1.8V part."
tcxo_volts_type = "enum:1.6,1.7,1.8,2.2,2.4,2.7,3.0,3.3"

tcxo_startup_ms = 10
tcxo_startup_ms_description = "How long the radio waits for the TCXO to settle before using the clock, 1-1000 ms."

# Low-data-rate optimization is derived automatically from spreading
# factor and bandwidth; there is no key for it.

# -- Network ------------------------------------------------------------
# Everything is broadcast. Leaves hear each other directly, so a fleet of
# nothing but leaves is a working network and these defaults need no
# changing. A repeater is for covering ground no pair of leaves can reach
# across on their own.
[network]
address = 1
address_description = "This node's address, 1-255. Must be unique on the network - it is how receivers tell one sender's positions from another's."

role = "leaf"
role_description = "leaf transmits and receives only. repeater also retransmits other nodes' broadcasts, extending range past one radio horizon at the cost of doubling the traffic it forwards."
role_type = "enum:leaf,repeater"

max_hops = 1
max_hops_description = "Retransmissions allowed for a broadcast this node sends, 0-8. 0 means no repeater forwards it; 1 covers a single-repeater deployment. This is a property of the sender, so raising it does not require touching the repeaters."

# -- Beacon -------------------------------------------------------------
[beacon]
interval_s = 10
interval_s_description = "Position broadcast period in seconds, 0-3600. 0 disables the beacon."

fields = "lat,lon"
fields_description = "Which GPS fields each broadcast carries: lat, lon, altitude, speed, course, sats, time. lat and lon are required. More fields result in more air time."

# -- SD card ------------------------------------------------------------
[sd]
sd_enabled = true
sd_enabled_description = "Use the SD card. false stops position logging and the card's power draw."

# -- GPS ----------------------------------------------------------------
# MAX-M10 receiver, applied as one UBX-CFG-VALSET to the RAM layer. An
# absent [gps] section leaves the module at its factory concurrent set.
[gps]
gps_enabled = true
gps_enabled_description = "Enable the GPS (US) constellation."

glonass_enabled = false
glonass_enabled_description = "Enable the GLONASS (Russia) constellation. The M10 tracks a limited concurrent set."

galileo_enabled = true
galileo_enabled_description = "Enable the Galileo (EU) constellation."

beidou_enabled = true
beidou_enabled_description = "Enable the BeiDou (China) constellation."

qzss_enabled = true
qzss_enabled_description = "Enable the QZSS (Japan) augmentation."

sbas_enabled = true
sbas_enabled_description = "Enable SBAS augmentation (WAAS, EGNOS and similar)."

power_mode = "full"
power_mode_description = "GPS power mode: full, psmoo (power-save on/off) or psmct (power-save cyclic tracking)."
power_mode_type = "enum:full,psmoo,psmct"

meas_rate_ms = 1000
meas_rate_ms_description = "GPS measurement and navigation period in ms, 25-10000."

dynamic_model = "portable"
dynamic_model_description = "GPS motion model: portable, stationary, pedestrian, automotive, sea, airborne1g, airborne2g or airborne4g."
dynamic_model_type = "enum:portable,stationary,pedestrian,automotive,sea,airborne1g,airborne2g,airborne4g"
